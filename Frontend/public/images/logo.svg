    <!-- Crochet hook — going up-right from ball -->
    <!-- Hook shaft -->
    <line x1="32" y1="-42" x2="52" y2="-80" stroke-width="3.5" style="fill:none;stroke:rgb(45, 107, 94);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Hook neck -->
